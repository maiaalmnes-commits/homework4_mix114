<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Meal & Cocktail Matcher</title>
    <style>
      /* Basic styling */
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="title">Meal + Cocktail Matching</h1>

    <div id="meal-container" class="meal">
      <h2 id="mealName"></h2>
      <img id="mealImage">
      <p id="mealCategory"></p>
      <p id="ingrediensTitle">Ingrediens:</p>
      <ul id="mealIngredients"></ul>
      <p id="mealInstructions"></p>
    </div>

    <div id="cocktail-container" class="cocktail">
      Matched or random cocktail info goes here
    </div>

    <script src="script.js"></script>
  </body>
</html>
